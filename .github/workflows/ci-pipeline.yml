name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests and Build
    runs-on: ubuntu-latest

    #Workflow timeout after 5 minutes
    timeout-minutes: 5

    # A local Test Database for CI Testing
    services:
      postgres:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_USER: proiectIP-testdb
          POSTGRES_PASSWORD: proiectIP-testdb
          POSTGRES_DB: proiectIP-testdb
        ports:
          - "5432:5432"
        # Wait for postgres to be ready before starting the job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://proiectIP-testdb:proiectIP-testdb@localhost:5432/proiectIP-testdb
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Test Database migrations
        run: bun db:migrate

      - name: Tests
        run: |
          bunx @biomejs/biome ci
          bun test

      - name: Build
        run: bun run build
