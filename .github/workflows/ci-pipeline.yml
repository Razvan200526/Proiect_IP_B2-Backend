name: CI Pipeline

on:
  push:
    branches:
      - devops/ci-pipeline
  workflow_dispatch:

jobs:
  deploy:
    name: Run Tests and Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }} # Should be TEST_DATABASE_URL
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ((Test)) database migrations
        run: bun db:migrate

      - name: Tests
        run: |
          bun test
        # bunx @biomejs/biome ci

      - name: Build
        run: bun run build
